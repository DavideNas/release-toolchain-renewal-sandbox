jenkins:
  systemMessage: "Welcome to Jenkins configured with Configuration as Code (JCasC)!"
  numExecutors: 2
  mode: EXCLUSIVE
  scmCheckoutRetryCount: 3

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "adminpassword123"
          properties:
            - apiToken:
                tokenStore:
                  tokenList: []

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://localhost:8080/"